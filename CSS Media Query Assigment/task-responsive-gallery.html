<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2: Responsive Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .info {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Mobile: 1 column */
        @media (max-width: 767px) {
            .gallery {
                grid-template-columns: 1fr;
            }

            .gallery-item img {
                height: 200px;
            }

            .info::after {
                content: " (Mobile: 1 Column)";
                font-weight: bold;
                color: #e74c3c;
            }
        }

        /* Tablet: 2 columns */
        @media (min-width: 768px) and (max-width: 1199px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr);
            }

            .gallery-item img {
                height: 280px;
            }

            .info::after {
                content: " (Tablet: 2 Columns)";
                font-weight: bold;
                color: #f39c12;
            }
        }

        /* Desktop: 4 columns */
        @media (min-width: 1200px) {
            .gallery {
                grid-template-columns: repeat(4, 1fr);
            }

            .gallery-item img {
                height: 300px;
            }

            .info::after {
                content: " (Desktop: 4 Columns)";
                font-weight: bold;
                color: #27ae60;
            }

            h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <h1>Responsive Image Gallery</h1>
    <p class="info">Resize your browser to see the gallery layout change</p>

    <div class="gallery-container">
        <div class="gallery">
            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 1</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 1</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 2</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 2</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 3</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 3</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 4</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 4</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 5</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 5</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 6</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 6</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 7</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 7</div>
            </div>

            <div class="gallery-item">
                <svg width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);">
                    <text x="50%" y="50%" font-size="24" fill="white" text-anchor="middle" dominant-baseline="middle">Image 8</text>
                </svg>
                <div class="gallery-item-label">Gallery Item 8</div>
            </div>
        </div>
    </div>
</body>
</html>
