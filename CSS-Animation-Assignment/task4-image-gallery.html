<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4: Animated Image Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 50px;
            font-size: 2.5em;
        }

        /* Gallery grid layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* Gallery item wrapper */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background-color: white;
            aspect-ratio: 1;
        }

        /* Gallery image */
        .gallery-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            
            /* Transition for smooth animations */
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        /* Hover state: Scale up and rotate */
        .gallery-item:hover .gallery-image {
            /* Scale up by 1.2 (20% larger) */
            transform: scale(1.2) rotate(2deg);
            filter: brightness(1.1) saturate(1.2);
        }

        /* Overlay on hover */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.4s ease;
        }

        .gallery-item:hover .overlay {
            background: rgba(0, 0, 0, 0.3);
        }

        .overlay-text {
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover .overlay-text {
            opacity: 1;
        }

        p {
            color: white;
            font-size: 16px;
            margin-top: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Animated Image Gallery</h1>
        
        <div class="gallery">
            <!-- Image 1 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=400&fit=crop" alt="Mountain landscape" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">Mountain View</span>
                </div>
            </div>

            <!-- Image 2 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=400&fit=crop" alt="Ocean waves" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">Ocean Waves</span>
                </div>
            </div>

            <!-- Image 3 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=400&fit=crop" alt="Forest trees" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">Forest Path</span>
                </div>
            </div>

            <!-- Image 4 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=400&fit=crop" alt="Sunset sky" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">Sunset Sky</span>
                </div>
            </div>

            <!-- Image 5 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=400&fit=crop" alt="Desert dunes" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">Desert Dunes</span>
                </div>
            </div>

            <!-- Image 6 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=400&fit=crop" alt="City lights" class="gallery-image">
                <div class="overlay">
                    <span class="overlay-text">City Lights</span>
                </div>
            </div>
        </div>

        <p>Hover over any image to see the zoom and rotation effect. The gallery is fully responsive and works on all screen sizes.</p>
    </div>
</body>
</html>
